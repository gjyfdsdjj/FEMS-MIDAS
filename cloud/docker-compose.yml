# cloud/docker-compose.yml
# 로컬 개발 및 EC2 배포용 컨테이너 구성
#
# services:
#
#   backend:
#     - image: python:3.10-slim
#     - build: ./backend
#     - 포트: 8000:8000
#     - 환경변수: .env 파일 주입
#     - depends_on: db, mqtt
#     - 커맨드: uvicorn main:app --host 0.0.0.0 --port 8000
#
#   frontend:
#     - image: python:3.10-slim
#     - build: ./frontend
#     - 포트: 8501:8501
#     - 환경변수: API_BASE_URL=http://backend:8000
#     - depends_on: backend
#     - 커맨드: streamlit run app.py --server.port 8501
#
#   mqtt:
#     - image: eclipse-mosquitto:2
#     - 포트: 1883:1883
#     - volumes: mosquitto.conf 마운트
#
#   db:  (로컬 개발용, 프로덕션은 AWS RDS 사용)
#     - image: postgres:15
#     - 포트: 5432:5432
#     - 환경변수: POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
#     - volumes: postgres_data 영구 볼륨
#
# volumes:
#   postgres_data:
